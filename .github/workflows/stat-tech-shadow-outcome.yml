name: stat-tech-shadow-outcome

on:
  pull_request:
    paths:
      - "scripts/stat_tech_shadow_outcome_tracker_v1.py"
      - "tests/test_stat_tech_shadow_outcome_tracker_v1.py"
      - "docs/stat_tech_shadow_outcome_tracker_v1.md"
      - ".github/workflows/stat-tech-shadow-outcome.yml"

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m py_compile scripts/stat_tech_shadow_outcome_tracker_v1.py
      - run: pytest -q tests/test_stat_tech_shadow_outcome_tracker_v1.py

  full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
