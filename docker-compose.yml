services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-trading-bot:local
    container_name: ai-trading-bot
    working_dir: /app
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
